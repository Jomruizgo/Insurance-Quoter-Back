spring.application.name=insurance-quoter-back
server.port=8080

# Datasource — PostgreSQL insurance_quoter_db (:5432)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=9

# Core service base URL
core.service.base-url=http://localhost:8081

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# Observability — Actuator, tracing (OTLP → Jaeger), metrics (Prometheus)
management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.health.show-details=always
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.observations.annotations.enabled=true
management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4320/v1/traces}
management.opentelemetry.resource-attributes.service.name=${spring.application.name}

# Logging — solo lo relevante para el proyecto
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]
logging.level.root=WARN
logging.level.com.sofka.insurancequoter=INFO
logging.level.org.flywaydb=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot.autoconfigure=ERROR
logging.level.org.springframework.boot=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina=WARN
