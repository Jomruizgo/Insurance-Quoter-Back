spring.application.name=Insurance-Quoter
server.port=8080

# Datasource — PostgreSQL insurance_quoter_db (:5432)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=9

# Core service base URL
core.service.base-url=http://localhost:8081

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# Logging — solo lo relevante para el proyecto
logging.level.root=WARN
logging.level.com.sofka.insurancequoter=INFO
logging.level.org.flywaydb=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot.autoconfigure=ERROR
logging.level.org.springframework.boot=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina=WARN
